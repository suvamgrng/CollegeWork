<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Mastery Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #ec4899;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --radius: 16px;
            --font-sans: 'Outfit', sans-serif;
            --font-mono: 'Fira Code', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text-main);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #app {
            width: 100%;
            max-width: 700px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Header & Progress */
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1.5rem; }
        .title-area h1 { font-size: 1.5rem; font-weight: 800; background: linear-gradient(to right, #818cf8, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .score-badge { font-weight: 600; color: var(--success); background: rgba(16, 185, 129, 0.1); padding: 4px 12px; border-radius: 20px; font-size: 0.9rem; }

        .progress-container { height: 8px; background: var(--border); border-radius: 10px; margin-bottom: 2rem; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 10px; }

        /* Question Card */
        .q-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 1rem; }
        .topic-tag { background: var(--primary); color: white; padding: 2px 10px; border-radius: 6px; font-size: 11px; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
        .q-num { color: var(--text-dim); font-size: 0.9rem; }

        .q-text { font-size: 1.25rem; line-height: 1.5; margin-bottom: 1.5rem; font-weight: 400; }
        pre {
            background: #000;
            padding: 1.5rem;
            border-radius: 12px;
            font-family: var(--font-mono);
            font-size: 0.95rem;
            margin: 1rem 0;
            color: #d1d5db;
            border-left: 4px solid var(--primary);
            overflow-x: auto;
        }

        /* Options */
        .options { display: grid; gap: 12px; }
        .opt {
            background: var(--card-bg);
            border: 2px solid var(--border);
            padding: 1rem 1.25rem;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1rem;
        }
        .opt:hover:not(.locked) { border-color: var(--primary); transform: translateX(5px); background: #2d3748; }
        .opt.selected { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); }
        .opt.correct { border-color: var(--success); background: rgba(16, 185, 129, 0.15); color: #6ee7b7; }
        .opt.wrong { border-color: var(--danger); background: rgba(239, 68, 68, 0.15); color: #fca5a5; }

        .opt-char { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: var(--border); border-radius: 8px; font-weight: 600; font-size: 0.8rem; }
        .correct .opt-char { background: var(--success); color: white; }
        .wrong .opt-char { background: var(--danger); color: white; }

        .explanation {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(16, 185, 129, 0.05);
            border-radius: 12px;
            border-left: 4px solid var(--success);
            font-size: 0.95rem;
            color: #d1d5db;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Controls */
        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-sans);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-prev { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
        .btn-prev:hover:not(:disabled) { color: var(--text-main); border-color: var(--text-main); }
        .btn-next { background: var(--primary); color: white; box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39); }
        .btn-next:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Result Screen */
        .result-screen { text-align: center; padding: 1rem 0; }
        .circular-progress {
            width: 150px; height: 150px; border-radius: 50%;
            background: conic-gradient(var(--primary) var(--p), var(--border) 0);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 2rem; position: relative;
        }
        .circular-progress::before {
            content: ""; position: absolute; width: 130px; height: 130px;
            background: var(--bg); border-radius: 50%;
        }
        .percentage { position: relative; font-size: 2.5rem; font-weight: 800; }

        .result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 2rem 0; }
        .res-card { background: var(--card-bg); padding: 1rem; border-radius: 16px; border: 1px solid var(--border); }
        .res-val { font-size: 1.5rem; font-weight: 700; display: block; }
        .res-lbl { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; }

        @media (max-width: 500px) {
            #app { padding: 1.25rem; }
            .q-text { font-size: 1.1rem; }
            .btn { padding: 0.6rem 1rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div id="app"></div>

<script>
    // (Keep original questions array here - I'll truncate for length but use your full list in your code)
    const questions = [
        {t:"Basics",q:"Which of the following is a valid Python comment?",o:["// This is a comment","/* comment */","# This is a comment","<!-- comment -->"],a:2,e:"Python uses # for single-line comments."},
        {t:"Basics",q:"What is the output of: print(type(42))?",o:["<class 'int'>","<class 'num'>","integer","int"],a:0,e:"type() returns the type object, displayed as <class 'int'>."},
        {t:"Basics",q:"Which keyword is used to define a function in Python?",o:["function","def","fun","define"],a:1,e:"Python uses 'def' to define functions."},
        {t:"Basics",q:"What does the following print?\n\nprint(10 // 3)",o:["3.33","3","4","3.0"],a:1,e:"// is floor division, returns the integer part: 10//3 = 3."},
        {t:"Variables",q:"Which of these is NOT a valid variable name in Python?",o:["my_var","_private","2fast","fast2"],a:2,e:"Variable names cannot start with a digit."},
        {t:"Variables",q:"What is the value of x after: x = 5; x += 3?",o:["5","3","8","53"],a:2,e:"+= adds to the existing value: 5+3=8."},
        {t:"Variables",q:"What does this print?\n\na = b = c = 10\nprint(a, b, c)",o:["Error","10 10 10","10","a b c"],a:1,e:"Python allows chained assignment. All three get the value 10."},
        {t:"Variables",q:"After this code runs, what is y?\n\nx = 10\ny = x\nx = 20\nprint(y)",o:["20","10","None","Error"],a:1,e:"Integers are immutable. y was assigned x's value (10) before x changed."},
        {t:"Datatypes",q:"What is the data type of: 3.14?",o:["int","double","float","decimal"],a:2,e:"Decimal numbers in Python are float by default."},
        {t:"Datatypes",q:"What is the output of: print(type(True))?",o:["<class 'bool'>","<class 'int'>","<class 'str'>","True"],a:0,e:"True and False are of type bool in Python."},
        {t:"Datatypes",q:"Which of these creates a string?",o:["x = 42","x = 3.14","x = 'hello'","x = True"],a:2,e:"String literals are enclosed in quotes."},
        {t:"Datatypes",q:"What is the result of: print(bool(0))?",o:["True","False","0","None"],a:1,e:"0, empty string, empty list, None all evaluate to False in Python."},
        {t:"Datatypes",q:"What does this output?\n\nx = \"Python\"\nprint(len(x))",o:["5","6","7","Error"],a:1,e:"len() counts characters. 'Python' has 6 characters."},
        {t:"Operators",q:"What is the result of: 2 ** 3?",o:["6","8","9","5"],a:1,e:"** is the exponentiation operator. 2**3 = 2×2×2 = 8."},
        {t:"Operators",q:"What does % do in Python?",o:["Division","Exponentiation","Modulus (remainder)","Percentage"],a:2,e:"% returns the remainder of division. 10%3 = 1."},
        {t:"Operators",q:"What is the output?\n\nprint(5 != 5)",o:["True","False","5","Error"],a:1,e:"!= checks inequality. 5 is equal to 5, so this is False."},
        {t:"Operators",q:"What does this evaluate to?\n\nprint(True and False or True)",o:["True","False","None","Error"],a:0,e:"'and' has higher precedence. (True and False) = False. False or True = True."},
        {t:"Operators",q:"What is the output?\n\nprint(15 % 4)",o:["3","4","3.75","1"],a:0,e:"15 divided by 4 is 3 with remainder 3. So 15%4 = 3."},
        {t:"Type Casting",q:"What is the output of: int('42')?",o:["Error","'42'","42","42.0"],a:2,e:"int() converts a string to integer if it contains a valid integer."},
        {t:"Type Casting",q:"What does this output?\n\nprint(float(7))",o:["7","7.0","'7.0'","Error"],a:1,e:"float() converts integer 7 to floating point 7.0."},
        {t:"Type Casting",q:"What happens when you run: int('3.14')?",o:["Returns 3","Returns 3.14","Raises ValueError","Returns '3'"],a:2,e:"int() cannot directly convert a string with decimal point. Use int(float('3.14')) instead."},
        {t:"Type Casting",q:"What is the output?\n\nx = str(100)\nprint(type(x))",o:["<class 'int'>","<class 'str'>","100","<class 'num'>"],a:1,e:"str() converts 100 to the string '100'. type() returns <class 'str'>."},
        {t:"Input",q:"What does input() always return?",o:["int","float","str","depends on what user types"],a:2,e:"input() always returns a string, regardless of what the user types."},
        {t:"Input",q:"How do you read an integer from the user?",o:["input(int)","int(input())","read_int()","scan()"],a:1,e:"You must wrap input() with int() to convert the string to integer."},
        {t:"Input",q:"What is printed?\n\nname = input('Enter name: ')\nprint('Hello', name)\n\n(user types: Alice)",o:["Hello","Hello Alice","Alice Hello","Enter name: Alice"],a:1,e:"print() with multiple args separates them with a space by default."},
        {t:"Lists",q:"What is the output?\n\nmy_list = [1, 2, 3]\nprint(my_list[-1])",o:["1","2","3","Error"],a:2,e:"Negative indexing: -1 accesses the last element."},
        {t:"Lists",q:"Which method adds an element to the end of a list?",o:[".add()",".insert()",".append()",".push()"],a:2,e:"list.append(value) adds an element to the end."},
        {t:"Lists",q:"What is the output?\n\na = [1, 2, 3, 4, 5]\nprint(a[1:4])",o:["[1, 2, 3]","[2, 3, 4]","[2, 3, 4, 5]","[1, 2, 3, 4]"],a:1,e:"Slicing a[1:4] returns elements at index 1, 2, 3 (not 4)."},
        {t:"Lists",q:"What does this code output?\n\nx = [10, 20, 30]\nx.remove(20)\nprint(x)",o:["[10, 30]","[10, 20]","[20, 30]","Error"],a:0,e:"remove() finds and removes the first occurrence of the given value."},
        {t:"Lists",q:"What is the length of: [1, [2, 3], 4]?",o:["4","3","2","5"],a:1,e:"len() counts top-level elements. The nested list [2,3] counts as one element."},
        {t:"Tuples",q:"Which of these creates a tuple with one element?",o:["(1)","(1,)","tuple(1)","[1]"],a:1,e:"A trailing comma is required for a single-element tuple. (1) is just an integer."},
        {t:"Tuples",q:"What happens when you run?\n\nt = (1, 2, 3)\nt[0] = 10",o:["t becomes (10,2,3)","TypeError","SyntaxError","Nothing"],a:1,e:"Tuples are immutable — you cannot change their elements after creation."},
        {t:"Tuples",q:"What is the output?\n\nt = (5, 10, 15)\nprint(t[1])",o:["5","10","15","Error"],a:1,e:"Indexing starts at 0. t[1] is the second element: 10."},
        {t:"Bubble Sort",q:"In bubble sort, after the first full pass over [5, 3, 8, 1], what does the list become?",o:["[1, 3, 5, 8]","[3, 5, 1, 8]","[3, 5, 8, 1]","[1, 5, 3, 8]"],a:1,e:"First pass bubbles the largest (8) to the end. Comparisons: 5>3 swap→[3,5,8,1], 5<8 no swap, 8>1 swap→[3,5,1,8]."},
        {t:"Bubble Sort",q:"What is the time complexity of bubble sort in the worst case?",o:["O(n)","O(n log n)","O(n²)","O(log n)"],a:2,e:"Bubble sort requires nested loops — n passes of n comparisons = O(n²)."},
        {t:"Bubble Sort",q:"What is missing to complete this bubble sort?\n\nfor i in range(len(arr)-1):\n    for j in range(_____):\n        if arr[j] > arr[j+1]:\n            arr[j],arr[j+1]=arr[j+1],arr[j]",o:["len(arr)","len(arr)-1","len(arr)-i-1","len(arr)+1"],a:2,e:"The inner loop should run len(arr)-i-1 times. The -i avoids re-checking already-sorted end elements."},
        {t:"If Conditional",q:"What is printed?\n\nx = 15\nif x > 10:\n    print('A')\nelif x > 5:\n    print('B')\nelse:\n    print('C')",o:["A","B","C","AB"],a:0,e:"x=15 satisfies the first condition (15>10), so 'A' is printed and the rest is skipped."},
        {t:"If Conditional",q:"What is the output?\n\nif 0:\n    print('yes')\nelse:\n    print('no')",o:["yes","no","0","Error"],a:1,e:"0 is falsy in Python, so the else branch executes."},
        {t:"If Conditional",q:"Which operator checks if a value is NOT in a list?",o:["!in","not in","!=","notin"],a:1,e:"'not in' is the correct Python operator for membership exclusion."},
        {t:"For Loop",q:"What does this print?\n\nfor i in range(3):\n    print(i, end=' ')",o:["0 1 2 ","1 2 3 ","0 1 2 3 ","0 1"],a:0,e:"range(3) generates 0,1,2. end=' ' replaces the newline with a space."},
        {t:"For Loop",q:"What is the output?\n\nfor i in range(2, 8, 2):\n    print(i, end=' ')",o:["2 4 6 8 ","2 4 6 ","0 2 4 6 ","2 4"],a:1,e:"range(2,8,2) starts at 2, steps by 2, stops before 8: 2, 4, 6."},
        {t:"For Loop",q:"What does this output?\n\nwords = ['cat','dog','bat']\nfor w in words:\n    if w.startswith('b'):\n        break\n    print(w)",o:["cat dog bat","cat dog","cat","dog"],a:1,e:"The loop prints 'cat' and 'dog'. When it reaches 'bat', the break exits the loop."},
        {t:"For Loop",q:"What is printed?\n\nfor i in range(5):\n    if i % 2 == 0:\n        continue\n    print(i, end=' ')",o:["0 2 4 ","1 3 ","1 2 3 4 ","0 1 2 3 4 "],a:1,e:"continue skips even numbers. Only odd numbers (1, 3) are printed."},
        {t:"While Loop",q:"How many times does this loop execute?\n\nx = 1\nwhile x < 5:\n    x += 1",o:["5","4","3","infinite"],a:1,e:"x starts at 1, increments to 5. Loop runs for x=1,2,3,4 — four times."},
        {t:"While Loop",q:"What is the output?\n\ni = 10\nwhile i > 0:\n    print(i, end=' ')\n    i -= 3",o:["10 7 4 1 ","10 7 4 ","10 7 4 1 -2 ","10 7"],a:0,e:"i takes values 10, 7, 4, 1. When i becomes -2 the condition i>0 is False and loop ends."},
        {t:"While Loop",q:"Which of these would create an infinite loop?",o:["while True: break","while 1 == 1: pass","while False: print('hi')","for i in range(0): print(i)"],a:1,e:"'1==1' is always True and 'pass' does nothing, so the loop never ends."},
        {t:"Dictionary",q:"What is the output?\n\nd = {'a':1,'b':2,'c':3}\nprint(d['b'])",o:["1","2","3","Error"],a:1,e:"Dictionary lookup by key. d['b'] returns 2."},
        {t:"Dictionary",q:"Which method returns all keys of a dictionary?",o:[".items()",".values()",".keys()",".get()"],a:2,e:"dict.keys() returns a view of all keys in the dictionary."},
        {t:"Dictionary",q:"What happens when you run?\n\nd = {'x': 10}\nprint(d['y'])",o:["None","0","KeyError","10"],a:2,e:"Accessing a key that doesn't exist raises KeyError. Use d.get('y') to avoid this."},
        {t:"Dictionary",q:"What does this output?\n\nd = {'a':1,'b':2}\nd.update({'b':99,'c':3})\nprint(d)",o:["{'a':1,'b':2,'c':3}","{'a':1,'b':99,'c':3}","{'b':99,'c':3}","Error"],a:1,e:"update() modifies existing keys and adds new ones. 'b' becomes 99, 'c' is added."},
        {t:"Sets",q:"What is the output?\n\ns = {1, 2, 2, 3, 3, 3}\nprint(len(s))",o:["6","3","1","Error"],a:1,e:"Sets only store unique values. Duplicates are removed, leaving {1,2,3} with length 3."},
        {t:"Sets",q:"Which of these set operations returns elements in BOTH sets?",o:["union","difference","intersection","symmetric_difference"],a:2,e:"intersection returns elements common to both sets."},
        {t:"Sets",q:"What is the output?\n\na = {1,2,3}\nb = {3,4,5}\nprint(a | b)",o:["{1,2,3,4,5}","{3}","{1,2,4,5}","Error"],a:0,e:"| is the union operator — combines all unique elements from both sets."},
        {t:"Sets",q:"Which of the following is TRUE about Python sets?",o:["Sets are ordered","Sets allow duplicate values","Sets are mutable but unordered","Sets support indexing"],a:2,e:"Sets are mutable (you can add/remove), but they are unordered and don't support indexing."},
        {t:"2D Lists",q:"What is the output?\n\nmatrix = [[1,2,3],[4,5,6],[7,8,9]]\nprint(matrix[1][2])",o:["4","5","6","9"],a:2,e:"matrix[1] is the row [4,5,6]. [2] is the third element: 6."},
        {t:"2D Lists",q:"How do you create a 3x3 zero matrix using list comprehension?",o:["[[0]*3 for i in range(3)]","[[0,0,0],[0,0,0],[0,0,0]]","Both A and B","[0]*9"],a:2,e:"Both approaches create a valid 3x3 matrix. Option A is the Pythonic way; B is explicit."},
        {t:"2D Lists",q:"What is printed?\n\ngrid = [[1,2],[3,4],[5,6]]\nfor row in grid:\n    print(row[0], end=' ')",o:["1 2 3 4 5 6 ","1 3 5 ","2 4 6 ","1 2 "],a:1,e:"Each iteration takes one row. row[0] picks the first column element: 1, 3, 5."},
        {t:"2D Lists",q:"What is the output?\n\na = [[1,2],[3,4]]\nb = a\nb[0][0] = 99\nprint(a[0][0])",o:["1","99","Error","None"],a:1,e:"b = a makes both variables point to the SAME object. Modifying b changes a too."},
        {t:"Basics",q:"What is the output?\n\nprint('Hello' * 3)",o:["Hello Hello Hello","HelloHelloHello","Error","Hello3"],a:1,e:"String * int repeats the string. No spaces are added between repetitions."},
        {t:"Lists",q:"What does this output?\n\na = [3,1,4,1,5,9,2]\na.sort()\nprint(a[0], a[-1])",o:["3 2","1 9","3 9","9 1"],a:1,e:"After sort(), list is [1,1,2,3,4,5,9]. a[0]=1 (smallest), a[-1]=9 (largest)."},
        {t:"Operators",q:"What is the output?\n\nprint(3 == 3.0)",o:["False","True","Error","3.0"],a:1,e:"Python compares by value. 3 and 3.0 are numerically equal, so this is True."},
        {t:"For Loop",q:"What does enumerate do in this code?\n\nfor i, v in enumerate(['a','b','c']):\n    print(i, v)",o:["Prints only values","Prints only indexes","Prints index and value pairs","Causes an error"],a:2,e:"enumerate() returns (index, value) pairs. Output: 0 a, 1 b, 2 c."},
        {t:"Dictionary",q:"What is printed?\n\nfor k,v in {'p':1,'q':2}.items():\n    print(k,v, end='; ')",o:["p q","1 2","p 1; q 2; ","Error"],a:2,e:".items() returns key-value pairs as tuples. The loop unpacks each into k and v."},
        {t:"Type Casting",q:"What is the output?\n\nprint(int(True), int(False))",o:["True False","Error","1 0","1.0 0.0"],a:2,e:"In Python, True maps to 1 and False maps to 0 in integer context."},
        {t:"Basics",q:"Which of these will cause a SyntaxError?",o:["x=5+3","if x>0 print(x)","y='hello'","z=[1,2,3]"],a:1,e:"The if statement is missing a colon (:) at the end. Correct: if x>0: print(x)"},
    ];

    let current = 0;
    let score = 0;
    let answered = new Array(questions.length).fill(null);
    let showingResult = false;

    function render() {
        const app = document.getElementById('app');
        if (showingResult) {
            renderResult(app);
            return;
        }

        const q = questions[current];
        const isAnswered = answered[current] !== null;
        const progress = ((answered.filter(a => a !== null).length) / questions.length) * 100;

        app.innerHTML = `
        <div class="header">
            <div class="title-area">
                <h1>Python Mastery</h1>
            </div>
            <div class="score-badge">Score: ${score}</div>
        </div>

        <div class="progress-container">
            <div class="progress-fill" style="width: ${progress}%"></div>
        </div>

        <div class="q-card">
            <div class="q-meta">
                <span class="topic-tag">${q.t}</span>
                <span class="q-num">Question ${current + 1} of ${questions.length}</span>
            </div>

            <div class="q-text">
                ${formatQuestionText(q.q)}
            </div>

            <div class="options">
                ${q.o.map((opt, i) => {
            let cls = 'opt';
            if (isAnswered) {
                cls += ' locked';
                if (i === q.a) cls += ' correct';
                else if (i === answered[current]) cls += ' wrong';
            } else if (answered[current] === i) {
                cls += ' selected';
            }
            return `
                        <div class="${cls}" onclick="handleChoice(${i})">
                            <span class="opt-char">${String.fromCharCode(65 + i)}</span>
                            <span>${escapeHtml(opt)}</span>
                        </div>
                    `;
        }).join('')}
            </div>

            ${isAnswered ? `<div class="explanation"><b>Explanation:</b> ${q.e}</div>` : ''}
        </div>

        <div class="controls">
            <button class="btn btn-prev" onclick="move(-1)" ${current === 0 ? 'disabled' : ''}>
                &larr; Previous
            </button>
            <div style="font-size: 0.8rem; color: var(--text-dim)">
                ${answered.filter(a => a !== null).length} / ${questions.length} Completed
            </div>
            ${current === questions.length - 1
            ? `<button class="btn btn-next" onclick="finish()">Finish &check;</button>`
            : `<button class="btn btn-next" onclick="move(1)">Next &rarr;</button>`
        }
        </div>
    `;
    }

    function formatQuestionText(text) {
        const parts = text.split('\n\n');
        if (parts.length > 1) {
            return `${parts[0]}<pre>${escapeHtml(parts.slice(1).join('\n\n'))}</pre>`;
        }
        return text;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function handleChoice(index) {
        if (answered[current] !== null) return;
        answered[current] = index;
        if (index === questions[current].a) score++;
        render();
    }

    function move(step) {
        current = Math.max(0, Math.min(questions.length - 1, current + step));
        render();
    }

    function finish() {
        showingResult = true;
        render();
    }

    function renderResult(app) {
        const pct = Math.round((score / questions.length) * 100);
        const wrong = answered.filter((a, i) => a !== null && a !== questions[i].a).length;
        const skipped = answered.filter(a => a === null).length;

        app.innerHTML = `
        <div class="result-screen">
            <h1 style="margin-bottom: 1.5rem">Exam Complete!</h1>

            <div class="circular-progress" style="--p: ${pct}%">
                <div class="percentage">${pct}%</div>
            </div>

            <p style="color: var(--text-dim); margin-bottom: 2rem">
                ${pct >= 80 ? "🔥 Exceptional! You're a Python Pro." :
            pct >= 60 ? "🚀 Great job! Just a few more topics to master." :
                "📚 Keep practicing! Consistency is key."}
            </p>

            <div class="result-grid">
                <div class="res-card"><span class="res-val" style="color: var(--success)">${score}</span><span class="res-lbl">Correct</span></div>
                <div class="res-card"><span class="res-val" style="color: var(--danger)">${wrong}</span><span class="res-lbl">Wrong</span></div>
                <div class="res-card"><span class="res-val" style="color: var(--warning)">${skipped}</span><span class="res-lbl">Skipped</span></div>
                <div class="res-card"><span class="res-val" style="color: var(--primary)">${score * 2}</span><span class="res-lbl">Total Marks</span></div>
            </div>

            <div style="display: flex; gap: 1rem; justify-content: center">
                <button class="btn btn-prev" onclick="restart()">Restart</button>
                <button class="btn btn-next" onclick="review()">Review Answers</button>
            </div>
        </div>
    `;
    }

    function restart() {
        current = 0; score = 0; showingResult = false;
        answered = new Array(questions.length).fill(null);
        render();
    }

    function review() {
        showingResult = false;
        current = 0;
        render();
    }

    render();
</script>

</body>
</html>
